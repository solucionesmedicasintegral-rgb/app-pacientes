async function buscarPacienteCSV(tel){try{const r=await fetch(PACIENTES_CSV);const t=await r.text();const lines=t.split(String.fromCharCode(10)).filter(function(l){return l.trim()});for(var i=1;i<lines.length;i++){var cols=lines[i].split(",");if(cols[0]&&cols[0].trim()===tel.trim())return{telefono:cols[0].trim(),nombre:cols[1]?cols[1].trim():"Paciente"}}return null}catch(e){return null}}
