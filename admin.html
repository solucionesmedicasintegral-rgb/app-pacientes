function parseCSVRows(text){
const lines=text.split('\n').filter(l=>l.trim());
return lines.length>1?lines.length-1:0;
}
function parseCSVFull(text){
const lines=text.split('\n').filter(l=>l.trim());
if(lines.length<2)return[];
const hdr=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
return lines.slice(1).map(line=>{
const vals=[];let cur='',inQ=false;
for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ}else if(c===','&&!inQ){vals.push(cur.replace(/^"|"$/g,'').trim());cur=''}else{cur+=c}}
vals.push(cur.replace(/^"|"$/g,'').trim());
const obj={};hdr.forEach((k,i)=>obj[k]=vals[i]||'');return obj;
}).filter(r=>r.ID||r.Paciente);
}
